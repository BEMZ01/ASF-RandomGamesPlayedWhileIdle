name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.configuration }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore RandomGamesPlayedWhileIdle.sln

      - name: Build
        run: dotnet build RandomGamesPlayedWhileIdle.sln --no-restore --configuration ${{ matrix.configuration }}

      - name: Upload build artifact
        if: matrix.configuration == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: RandomGamesPlayedWhileIdle
          path: RandomGamesPlayedWhileIdle/bin/Release/net*/RandomGamesPlayedWhileIdle.dll
          if-no-files-found: error
